# darkvoid for tuicr — mapped from ~/.config/nvim/lua/plugins/themes/darkvoid.lua
# Source palette: aliqyan-21/darkvoid.nvim + Laurent's overrides.

# Base panels & text
panel_bg = "#1c1c1c"            # darkvoid bg
bg_highlight = "#303030"        # visual selection
fg_primary = "#c0c0c0"          # darkvoid fg
fg_secondary = "#9e9e9e"        # midpoint between fg and comment
fg_dim = "#585858"              # darkvoid comment

# Diff (gitsigns palette: added / removed pastels)
diff_add = "#baffc9"
diff_add_bg = "#1f3327"
diff_del = "#ffb3ba"
diff_del_bg = "#3a1f24"
diff_context = "#c0c0c0"
diff_hunk_header = "#99CCFF"    # darkvoid type
expanded_context_fg = "#585858"

# Syntax-tinted diff backgrounds (match diff backgrounds for visual consistency)
syntax_add_bg = "#1f3327"
syntax_del_bg = "#3a1f24"
syntax_theme = "darkvoid-syntax.tmTheme"

# File-status (gitsigns added / changed / removed + lavender for renames)
file_added = "#baffc9"
file_modified = "#ffffba"
file_deleted = "#ffb3ba"
file_renamed = "#E5CCFF"        # darkvoid string

# Review progress
reviewed = "#1bfd9c"            # vibrant mint (pmenu_sel_bg)
pending = "#ffffba"             # gitsigns changed

# Comment classifications
comment_note = "#7fa1c3"        # LSP info
comment_suggestion = "#5EEEAF"  # darkvoid func / operator
comment_issue = "#dea6a0"       # LSP error
comment_praise = "#bdfe58"      # darkvoid kw / cursor lime

# UI chrome
border_focused = "#bdfe58"      # title lime
border_unfocused = "#585858"    # telescope border
status_bar_bg = "#1c1c1c"
cursor_color = "#bdfe58"
cursor_line_bg = "#262626"      # one notch above panel_bg
branch_name = "#E5CCFF"         # string lavender
help_indicator = "#585858"

# Inline messages (dark fg on saturated bg, matches the teal example's contrast pattern)
message_info_fg = "#1c1c1c"
message_info_bg = "#7fa1c3"
message_warning_fg = "#1c1c1c"
message_warning_bg = "#ffffba"
message_error_fg = "#1c1c1c"
message_error_bg = "#dea6a0"
update_badge_fg = "#1c1c1c"
update_badge_bg = "#bdfe58"

# Mode indicator (vim-like, mint on dark)
mode_fg = "#1c1c1c"
mode_bg = "#1bfd9c"
