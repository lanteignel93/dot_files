#──────────────────────────────────────────────────────────────────────────────
# GENERAL
#──────────────────────────────────────────────────────────────────────────────
# use zsh as default shell
set-option -g default-shell /bin/zsh

# enable true color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# general settings
set -g set-clipboard on          # use system clipboard
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 2             # remove delay for exiting insert mode with ESC in Neovim
set -g history-limit 5000        # increase history size
set -g mouse on                  # enable mouse support
set -g status-interval 3         # update the status bar every 3 seconds
set -g status-position top       # move status bar to the top

# start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

#──────────────────────────────────────────────────────────────────────────────
# KEYMAPS
#──────────────────────────────────────────────────────────────────────────────
# refresh tmux config with r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# split horizontally in current path
bind | split-window -h -c "#{pane_current_path}"

# split vertically in current path
bind - split-window -v -c "#{pane_current_path}"

# new window in current path
bind c new-window -c "#{pane_current_path}"

# use vim arrow keys to resize panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# maximize pane with m
bind -r m resize-pane -Z

# enable vi mode for buffer manipulations
set-window-option -g mode-keys vi

# start selecting text with "v"
bind-key -T copy-mode-vi 'v' send -X begin-selection

# copy text with "y" (cross-platform)
# requires `xclip` on Linux. install with `sudo apt install xclip` or equivalent.
if-shell 'uname | grep -q Darwin' \
  "bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'"

# paste yanked text with "P"
bind P paste-buffer

# don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

#──────────────────────────────────────────────────────────────────────────────
# THEME (darkvoid)
#──────────────────────────────────────────────────────────────────────────────
# palette — kept in sync with ~/.local/share/nvim/lazy/darkvoid.nvim/lua/darkvoid/colors.lua
darkvoid_bg='#1c1c1c'
darkvoid_fg='#c0c0c0'
darkvoid_lime='#bdfe58'
darkvoid_neon='#1bfd9c'        # search/selection accent — used for active tab + active pane border
darkvoid_sea_green='#5EEEAF'
darkvoid_lavender='#E5CCFF'
darkvoid_red='#dea6a0'
darkvoid_comment='#585858'
darkvoid_dark_gray='#303030'
darkvoid_subtle='#222222'      # darker than dark_gray, just above bar bg — for very-faint caps
darkvoid_type='#a1a1a1'        # mid-light grey for readable-but-dim inactive text

# rounded chip caps (Powerline-extra glyphs — Nerd Font required)
chip_left=''
chip_right=''

# nerd font icons & separators
icon_cpu=''              # nf-fa-microchip
icon_mem='󰍛'              # nf-md-memory
icon_branch=''        # powerline branch
sep_dot='·'                # middle dot
act_dot='•'                # bullet
icon_zoom='Z'                  # plain ASCII — swap to a glyph if you want

# status bar layout
set -g status-justify left
set -g status-style "fg=${darkvoid_fg},bg=${darkvoid_bg}"
set -g status-left-length 100
set -g status-right-length 160

# activity monitoring drives the inactive-tab activity dot
setw -g monitor-activity on
set -g visual-activity off

# panes — active border uses the neon accent
set -g pane-border-style "fg=${darkvoid_comment}"
set -g pane-active-border-style "fg=${darkvoid_neon}"

# command/message bar
set -g message-style "fg=${darkvoid_bg},bg=${darkvoid_lime}"
set -g message-command-style "fg=${darkvoid_fg},bg=${darkvoid_dark_gray}"

# window tabs as rounded chips
setw -g window-status-separator " "
# baseline styles for inactive variants — keep all variants identical so activity/bell
# windows don't get tmux's default reverse-video (which renders them as grey pills)
setw -g window-status-style "fg=${darkvoid_comment},bg=${darkvoid_bg}"
setw -g window-status-activity-style "fg=${darkvoid_comment},bg=${darkvoid_bg}"
setw -g window-status-bell-style "fg=${darkvoid_comment},bg=${darkvoid_bg}"
setw -g window-status-last-style "fg=${darkvoid_comment},bg=${darkvoid_bg}"
# inactive: invisible caps (same color as bar bg) + lighter text — only text shows
setw -g window-status-format "#[fg=${darkvoid_bg},bg=${darkvoid_bg}]${chip_left}#[fg=${darkvoid_type},bg=${darkvoid_bg}] #I #W #[fg=${darkvoid_bg},bg=${darkvoid_bg}]${chip_right}"
# active: rounded chip in lime + bold dark text
setw -g window-status-current-format "#[fg=${darkvoid_lime},bg=${darkvoid_bg}]${chip_left}#[fg=${darkvoid_bg},bg=${darkvoid_lime},bold] #I #W #[fg=${darkvoid_lime},bg=${darkvoid_bg}]${chip_right}"

# status-left: session chip — flips to lavender when prefix is held
set -g status-left "#[fg=#{?client_prefix,${darkvoid_lavender},${darkvoid_sea_green}},bg=${darkvoid_bg}]${chip_left}#[fg=${darkvoid_bg},bg=#{?client_prefix,${darkvoid_lavender},${darkvoid_sea_green}},bold] #S #[fg=#{?client_prefix,${darkvoid_lavender},${darkvoid_sea_green}},bg=${darkvoid_bg}]${chip_right} "

# status-right: optional git-branch chip (lavender, only inside a repo) + cpu/mem/date chip
set -g status-right "#(cd '#{pane_current_path}' 2>/dev/null && b=$(git branch --show-current 2>/dev/null) && [ -n \"$b\" ] && printf '#[fg=${darkvoid_lavender},bg=${darkvoid_bg}]${chip_left}#[fg=${darkvoid_bg},bg=${darkvoid_lavender},bold] ${icon_branch} %s #[fg=${darkvoid_lavender},bg=${darkvoid_bg}]${chip_right} ' \"$b\")#[fg=${darkvoid_dark_gray},bg=${darkvoid_bg}]${chip_left}#[fg=${darkvoid_fg},bg=${darkvoid_dark_gray}] ${icon_cpu} #{cpu} ${sep_dot} ${icon_mem} #{mem} ${sep_dot} %a %d %b ${sep_dot} %H:%M #[fg=${darkvoid_dark_gray},bg=${darkvoid_bg}]${chip_right}"

#──────────────────────────────────────────────────────────────────────────────
# PLUGINS (TPM)
#──────────────────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # navigate between nvim and tmux
set -g @plugin 'tmux-plugins/tmux-resurrect'    # persist sessions after restart
set -g @plugin 'tmux-plugins/tmux-continuum'    # automatically save sessions
set -g @plugin 'hendrikmi/tmux-cpu-mem-monitor' # cpu and memory monitor

# resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'       # auto-restore last saved environment when tmux server starts
set -g @continuum-save-interval '15' # auto-save every 15 minutes

# initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
